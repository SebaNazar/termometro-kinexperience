name: Termómetro Kinexperience

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:          # ejecución manual

jobs:
  actualizar-termometro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Reconstruir credenciales desde secreto
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > /tmp/credentials.json

      - name: Ejecutar termómetro
        env:
          GOOGLE_CREDENTIALS_PATH: /tmp/credentials.json
        run: echo "s" | python3 termometro.py

      - name: Copiar HTML como index
        run: cp docs/*.html docs/index.html

      - name: Commit y push del HTML generado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "chore: actualizar termómetro $(date +'%Y-%m-%d %H:%M UTC')"
          git push
